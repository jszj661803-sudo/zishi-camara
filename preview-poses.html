<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4张精选姿势图预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e; color: #e0e0e0;
      font-family: -apple-system, "Segoe UI", sans-serif;
      padding: 20px;
      text-align: center;
    }
    h1 { font-size: 18px; margin-bottom: 20px; color: #e94560; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; max-width: 1000px; margin: 0 auto;
    }
    .card {
      background: #16213e; border-radius: 14px;
      overflow: hidden; box-shadow: 0 6px 24px rgba(0,0,0,.4);
    }
    .card img {
      width: 100%; aspect-ratio: 3/4; object-fit: cover;
      display: block;
    }
    .card .info {
      padding: 12px; font-size: 13px;
    }
    .card .style-tag {
      display: inline-block; padding: 2px 10px; border-radius: 10px;
      font-size: 12px; font-weight: 700; margin-bottom: 4px;
    }
    .tag-lively { background: #FF9800; color: #fff; }
    .tag-cool { background: #607D8B; color: #fff; }
    .tag-sweet { background: #E91E63; color: #fff; }
    .links { margin-top: 20px; }
    .links a {
      display: inline-block; margin: 5px 10px; color: #e94560;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>AI 拍摄指导相机 · 4张精选姿势模板图</h1>
  <div class="grid" id="grid"></div>
  <div class="links">
    <p style="color:#888;font-size:12px;">当前仅有女性·单人可用，其他分类待补充</p>
    <a href="./ui-c-live.html">→ 返回相机界面</a>
  </div>
  <script>
    var poses = [
      { name: '显高全身照', style: '活泼', tag: 'tag-lively', src: './data/generated-models/女性/单人/活泼/female_single_lively_002_model.png', outline: './data/generated-models/女性/单人/活泼/female_single_lively_002_outline.svg' },
      { name: '走路抓拍', style: '活泼', tag: 'tag-lively', src: './data/generated-models/女性/单人/活泼/female_single_lively_001_model.png', outline: './data/generated-models/女性/单人/活泼/female_single_lively_001_outline.svg' },
      { name: '城市侧身街拍', style: '痞帅', tag: 'tag-cool', src: './data/generated-models/女性/单人/痞帅/female_single_cool_001_model.png', outline: './data/generated-models/女性/单人/痞帅/female_single_cool_001_outline.svg' },
      { name: '花丛氛围照', style: '甜美', tag: 'tag-sweet', src: './data/generated-models/女性/单人/甜美/female_single_sweet_001_model.png', outline: './data/generated-models/女性/单人/甜美/female_single_sweet_001_outline.svg' },
    ];
    var grid = document.getElementById('grid');
    poses.forEach(function(p) {
      var card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<img src="' + p.src + '" alt="' + p.name + '" loading="lazy" onerror="this.style.background=\'#333\';this.style.minHeight=\'300px\'" />' +
        '<div class="info"><span class="style-tag ' + p.tag + '">' + p.style + '</span> ' +
        '<strong>' + p.name + '</strong><br>' +
        '<a href="' + p.outline + '" target="_blank" style="font-size:11px;color:#999;">查看轮廓图 SVG</a></div>';
      grid.appendChild(card);
    });
  </script>
</body>
</html>
